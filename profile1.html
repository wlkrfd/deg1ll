<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Core | Profile Details</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');

        :root {
            --accent-color: #bc13fe;
            --accent-glow: rgba(188, 19, 254, 0.5);
            --bg-dark: #050505;
            --text-main: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition-base: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Background Slideshow --- */
        #bg-viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transform: scale(1.1);
            transition: opacity 2s ease-in-out, transform 8s linear;
        }

        .slide.active {
            opacity: 0.3;
            transform: scale(1);
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--bg-dark) 0%, transparent 50%, var(--bg-dark) 100%);
            z-index: -1;
        }

        /* --- Layout --- */
        .page-wrapper {
            display: flex;
            height: 100vh;
            width: 100%;
            padding: 40px 5%;
            gap: 40px;
            align-items: center;
            position: relative;
            z-index: 5;
            animation: pageSlideUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes pageSlideUp {
            from { opacity: 0; transform: translateY(60px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Biography Window (Left) --- */
        .bio-window {
            flex: 1;
            max-width: 500px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-left: 4px solid var(--accent-color);
            border-radius: 20px;
            padding: 50px;
            backdrop-filter: blur(30px);
            box-shadow: 0 0 40px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
        }

        .bio-window h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--accent-color);
            text-shadow: 0 0 15px var(--accent-glow);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .bio-content {
            font-size: 1rem;
            line-height: 1.8;
            color: rgba(255,255,255,0.7);
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 15px;
        }

        .bio-content::-webkit-scrollbar {
            width: 4px;
        }

        .bio-content::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 10px;
        }

        .meta-data {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        /* --- Photo Container (Right) --- */
        .photo-container {
            flex: 1.5;
            height: 80vh;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            background-size: cover;
            background-position: center;
            background-image: url('profile1.jpg');
        }

        .photo-container:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        /* --- Back Button --- */
        .back-btn {
            position: fixed;
            top: 40px;
            left: 5%;
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.5;
            transition: 0.3s;
            z-index: 100;
        }

        .back-btn:hover {
            opacity: 1;
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- Animations --- */
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 1024px) {
            .page-wrapper {
                flex-direction: column-reverse;
                overflow-y: auto;
                height: auto;
                padding-top: 100px;
            }
            .bio-window {
                max-width: 100%;
                margin-bottom: 40px;
            }
            .photo-container {
                width: 100%;
                min-height: 400px;
            }
        }
    </style>
</head>
<body>

    <div id="bg-viewport"></div>
    <div id="overlay"></div>

    <a href="hub.html" class="back-btn">← RETURN TO HUB</a>

    <div class="page-wrapper">
        <div class="bio-window">
            <h2>мерч Deg1ll</h2>
            <div class="bio-content">
                <p>Добро пожаловать в раздел эксклюзивного мерча Deg1ll.</p>
                <br>
                <p>Коллекция: "дрявый иван"<br>Статус: В производстве<br>Доступность: Limited Edition</p>
                <br>
                <p>Каждая деталь нашего мерча пропитана спидом каждого из 5 школы города прилук.</p>
            </div>
            <div class="meta-data">
                <span>Authenticity Verified: 100%</span>
                <span>Release Date: Q2 2026</span>
            </div>
        </div>

        <div class="photo-container">
            <!-- Asset Loaded -->
        </div>
    </div>

    <script>
        const backgroundImages = [
            'photo_2026-01-11_20-35-45.jpg',
            'photo_2026-01-11_20-36-02.jpg',
            'photo_2026-01-11_20-36-52.jpg'
        ];

        const viewport = document.getElementById('bg-viewport');
        let currentSlideIndex = 0;
        let slides = [];

        function initSlideshow() {
            backgroundImages.forEach((url, i) => {
                const slide = document.createElement('div');
                slide.className = `slide ${i === 0 ? 'active' : ''}`;
                slide.style.backgroundImage = `url('${url}')`;
                viewport.appendChild(slide);
                slides.push(slide);
            });
            setInterval(() => {
                slides[currentSlideIndex].classList.remove('active');
                currentSlideIndex = (currentSlideIndex + 1) % slides.length;
                slides[currentSlideIndex].classList.add('active');
            }, 6000);
        }

        initSlideshow();
    </script>
</body>
</html>
