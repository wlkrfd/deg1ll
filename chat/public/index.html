<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deg1ll Chat | WebSocket</title>
    <!-- Подключаем стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <!-- Заголовок -->
        <header class="chat-header">
            <h1>Deg1ll <span>Messenger</span></h1>
            <div id="status" class="status offline">Отключено</div>
        </header>

        <!-- Окно сообщений -->
        <main id="chat-window" class="chat-window">
            <div class="welcome-msg">Добро пожаловать в неоновый чат...</div>
        </main>

        <!-- Форма отправки -->
        <footer class="chat-footer">
            <input type="text" id="username" placeholder="Ник" maxlength="15">
            <input type="text" id="message-input" placeholder="Введите сообщение..." autocomplete="off">
            <button id="send-btn">Отправить</button>
        </footer>
    </div>

    <!-- Подключаем скрипт -->
    <script src="script.js"></script>
</body>
</html>
